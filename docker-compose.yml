services:
  api:
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy

  dash:
    restart: always
    depends_on:
      api:
        condition: service_started

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_USER: beibeilles
      POSTGRES_PASSWORD: beibeilles
      POSTGRES_DB: beibeilles
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beibeilles -d beibeilles"]
      interval: 5s
      timeout: 5s
      retries: 10

# Pour garder les anciennes données lors d'un déploiement
volumes:
  timescaledb_data:
    name: deploy_timescaledb_data
