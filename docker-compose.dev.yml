services:
  api:
    build: ./api
    environment:
      DATABASE_URL: sqlite:///./beehive.db
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app

  dash:
    build: ./dash_app
    environment:
      API_URL: http://localhost:8000
    ports:
      - "8050:8050"
    volumes:
      - ./dash_app:/app

  timescaledb:
    ports:
      - "5432:5432"
