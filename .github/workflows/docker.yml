name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16

        env:
          POSTGRES_USER: beibeilles
          POSTGRES_PASSWORD: beibeilles
          POSTGRES_DB: beibeilles

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U beibeilles -d beibeilles"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # =====================================================
      # Installation dépendances API
      # =====================================================
      - name: Install API dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =====================================================
      # Vérification Ruff
      # =====================================================
      - name: Ruff check
        run: |
          cd api
          ruff check .

      # =====================================================
      # Vérification typing
      # =====================================================
      - name: MyPy check
        run: |
          cd api
          mypy app

      # =====================================================
      # Tests Pytest
      # =====================================================
      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://beibeilles:beibeilles@localhost:5432/beibeilles
          TESTING: "1"
        run: |
          cd api
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70

      # =====================================================
      # Vérifie que FastAPI démarre correctement
      # =====================================================
      - name: Validate FastAPI startup
        env:
          DATABASE_URL: postgresql+psycopg://beibeilles:beibeilles@localhost:5432/beibeilles
        run: |
          cd api
          python -c "from app.main import app"

      # =====================================================
      # Vérifie les migrations
      # =====================================================
      - name: Validate Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg://beibeilles:beibeilles@localhost:5432/beibeilles
          PYTHONPATH: .
        run: |
          cd api
          alembic upgrade head

      # =====================================================
      # Vérifie le script d'agrégation
      # =====================================================
      - name: Validate aggregation script
        env:
          DATABASE_URL: postgresql+psycopg://beibeilles:beibeilles@localhost:5432/beibeilles
          PYTHONPATH: .
        run: |
          cd api
          python scripts/aggregate_measurements_5m.py

      # =====================================================
      # Login GHCR
      # =====================================================
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u tgalton --password-stdin

      # =====================================================
      # Build + Push API
      # =====================================================
      - name: Build API image
        run: |
          docker build -t ghcr.io/tgalton/beibeilles-api:latest ./api
          docker push ghcr.io/tgalton/beibeilles-api:latest

      # =====================================================
      # Build + Push Dash
      # =====================================================
      - name: Build Dash image
        run: |
          docker build -t ghcr.io/tgalton/beibeilles-dash:latest ./dash_app
          docker push ghcr.io/tgalton/beibeilles-dash:latest
